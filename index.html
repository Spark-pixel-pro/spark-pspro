<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark — PS PRO Solutions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111111;
    color: #f0f0f0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  .header { text-align: center; margin-bottom: 20px; }
  .header .title { font-size: 1.8rem; font-weight: 800; color: #FFD600; letter-spacing: 2px; }
  .header .subtitle { font-size: 0.85rem; color: #888; letter-spacing: 1px; margin-top: 4px; }

  .tryb-wrap { display: flex; gap: 12px; margin: 16px 0; }
  .tryb-btn {
    padding: 10px 20px; border-radius: 24px; border: 2px solid #333;
    background: #1a1a1a; color: #888; font-weight: 600; cursor: pointer;
    font-size: 0.9rem; transition: all 0.2s;
  }
  .tryb-btn.aktywny.klient { border-color: #FFD600; background: #FFD600; color: #111; }
  .tryb-btn.aktywny.pracownik { border-color: #4A9EFF; background: #4A9EFF; color: #111; }

  .mic-wrap { display: flex; flex-direction: column; align-items: center; margin: 24px 0; }
  .mic-btn {
    width: 100px; height: 100px; border-radius: 50%;
    background: #1a1a1a; border: 3px solid #FFD600;
    font-size: 40px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn.listening {
    background: #FFD600;
    animation: pulse 1.2s infinite;
  }
  .mic-btn.thinking {
    background: #4A9EFF;
    border-color: #4A9EFF;
    animation: spin-pulse 1s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,214,0,0.5); }
    70% { box-shadow: 0 0 0 20px rgba(255,214,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,214,0,0); }
  }
  @keyframes spin-pulse {
    0% { opacity: 1; }
    50% { opacity: 0.5; }
    100% { opacity: 1; }
  }
  .status { margin-top: 14px; font-size: 0.85rem; color: #888; min-height: 20px; text-align: center; }
  .interim { margin-top: 6px; font-size: 0.8rem; color: #FFD600; min-height: 18px; text-align: center; font-style: italic; }

  .chat { width: 100%; max-width: 560px; flex: 1; }
  .bubble {
    padding: 12px 16px; border-radius: 14px; margin-bottom: 10px;
    font-size: 0.95rem; line-height: 1.4; max-width: 85%;
  }
  .bubble.user { background: #FFD600; color: #111; margin-left: auto; font-weight: 600; }
  .bubble.spark { background: #222; color: #f0f0f0; margin-right: auto; }

  .divider { width: 100%; max-width: 560px; border: none; border-top: 1px solid #333; margin: 4px 0 16px; }

  .error-box {
    background: #3a1f1f; color: #ff9a9a; padding: 12px 16px;
    border-radius: 10px; font-size: 0.85rem; max-width: 560px; width: 100%;
    display: none; margin-bottom: 16px;
  }
</style>
</head>
<body>

  <div class="header">
    <div class="title">SPARK</div>
    <div class="subtitle">PS PRO SOLUTIONS — ASYSTENT GŁOSOWY</div>
  </div>

  <div class="tryb-wrap">
    <button class="tryb-btn klient aktywny klient" id="btnKlient">👤 Klient</button>
    <button class="tryb-btn pracownik" id="btnPracownik">👷 Pracownik</button>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="mic-wrap">
    <button class="mic-btn" id="micBtn">🎤</button>
    <div class="status" id="status">Kliknij mikrofon i powiedz coś</div>
    <div class="interim" id="interim"></div>
  </div>

  <hr class="divider">
  <div class="chat" id="chat"></div>

<script>
// ====== KONFIGURACJA ======
const EDGE_FUNCTION_URL = "https://kmxmgxiobhcovrvvcdqh.supabase.co/functions/v1/bright-api";
const SUPABASE_ANON_KEY = "sb_publishable_FiS3WrWInHeqakBWl8mr6A_aVC4IJ32";
const CISZA_TIMEOUT_MS = 1500;

// ====== STAN ======
let trybAktywny = "klient";
let historiaRozmowy = [];

// ====== ELEMENTY ======
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const interimEl = document.getElementById('interim');
const chatEl = document.getElementById('chat');
const errorBox = document.getElementById('errorBox');
const btnKlient = document.getElementById('btnKlient');
const btnPracownik = document.getElementById('btnPracownik');

btnKlient.addEventListener('click', () => ustawTryb('klient'));
btnPracownik.addEventListener('click', () => ustawTryb('pracownik'));

function ustawTryb(tryb) {
  trybAktywny = tryb;
  btnKlient.classList.toggle('aktywny', tryb === 'klient');
  btnPracownik.classList.toggle('aktywny', tryb === 'pracownik');
  historiaRozmowy = [];
  chatEl.innerHTML = '';
  statusEl.textContent = tryb === 'klient'
    ? 'Tryb klienta — kliknij mikrofon i powiedz coś'
    : 'Tryb pracownika — zapytaj o procedurę lub przykład';
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

function addBubble(text, who) {
  const div = document.createElement('div');
  div.className = 'bubble ' + who;
  div.textContent = text;
  chatEl.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

// ====== ROZPOZNAWANIE MOWY ======
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  showError("Ta przeglądarka nie obsługuje rozpoznawania mowy. Użyj Chrome lub Safari.");
  micBtn.disabled = true;
} else {
  const recognition = new SpeechRecognition();
  recognition.lang = 'pl-PL';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  let listening = false;
  let przetworzone = false;
  let ostatniTekst = '';
  let timerCiszy = null;

  micBtn.addEventListener('click', () => {
    if (listening) return;

    // Odblokowanie syntezy mowy na iOS Safari — musi się wydarzyć bezpośrednio przy kliknięciu
    if (window.speechSynthesis) {
      const cichaProbka = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(cichaProbka);
    }

    przetworzone = false;
    ostatniTekst = '';
    interimEl.textContent = '';
    try {
      recognition.start();
    } catch (e) {
      showError("Nie udało się uruchomić mikrofonu: " + e.message);
    }
  });

  recognition.onstart = () => {
    listening = true;
    micBtn.classList.add('listening');
    statusEl.textContent = "Słucham...";
    errorBox.style.display = 'none';
  };

  recognition.onerror = (e) => {
    listening = false;
    micBtn.classList.remove('listening');
    if (e.error === 'not-allowed' || e.error === 'permission-denied') {
      showError("Brak dostępu do mikrofonu. Wejdź w Ustawienia Safari → Mikrofon i zezwól, potem odśwież stronę.");
    } else if (e.error === 'no-speech') {
      statusEl.textContent = "Nie usłyszałem nic — spróbuj ponownie.";
    } else {
      showError("Błąd mikrofonu: " + e.error);
    }
  };

  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove('listening');
    if (timerCiszy) clearTimeout(timerCiszy);

    if (!przetworzone && ostatniTekst.trim()) {
      przetworzone = true;
      const tekst = ostatniTekst.trim();
      interimEl.textContent = '';
      addBubble(tekst, 'user');
      wyslijDoMozguSparka(tekst);
    }
  };

  recognition.onresult = (event) => {
    let interimText = '';
    let finalText = '';

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += transcript;
      } else {
        interimText += transcript;
      }
    }

    const aktualnyTekst = finalText || interimText;
    if (aktualnyTekst) {
      ostatniTekst = aktualnyTekst;
      interimEl.textContent = aktualnyTekst;
    }

    if (timerCiszy) clearTimeout(timerCiszy);
    timerCiszy = setTimeout(() => {
      if (!przetworzone) {
        recognition.stop();
      }
    }, CISZA_TIMEOUT_MS);

    if (finalText && !przetworzone) {
      przetworzone = true;
      interimEl.textContent = '';
      recognition.stop();
      addBubble(finalText, 'user');
      wyslijDoMozguSparka(finalText);
    }
  };
}

// ====== WYSYŁKA DO SPARK-BRAIN ======
async function wyslijDoMozguSparka(wiadomosc) {
  micBtn.classList.add('thinking');
  statusEl.textContent = "Spark myśli...";

  try {
    const response = await fetch(EDGE_FUNCTION_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + SUPABASE_ANON_KEY,
        "apikey": SUPABASE_ANON_KEY
      },
      body: JSON.stringify({
        wiadomosc: wiadomosc,
        tryb: trybAktywny,
        historia: historiaRozmowy
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error("Błąd serwera (" + response.status + "): " + errText);
    }

    const data = await response.json();
    const odpowiedz = data.odpowiedz;

    historiaRozmowy.push({ role: "user", content: wiadomosc });
    historiaRozmowy.push({ role: "assistant", content: odpowiedz });

    addBubble(odpowiedz, 'spark');
    speak(odpowiedz);
    statusEl.textContent = trybAktywny === 'klient'
      ? 'Kliknij mikrofon i powiedz coś'
      : 'Zapytaj o procedurę lub przykład';
  } catch (err) {
    showError("Nie udało się połączyć ze Sparkiem: " + err.message);
    statusEl.textContent = "Kliknij mikrofon i powiedz coś";
  } finally {
    micBtn.classList.remove('thinking');
  }
}

// ====== SYNTEZA MOWY ======
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'pl-PL';
  utterance.rate = 1.0;
  window.speechSynthesis.speak(utterance);
}
</script>

</body>
</html>

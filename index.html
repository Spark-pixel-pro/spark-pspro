<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark — PS PRO Solutions</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111111;
    color: #f0f0f0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  .header { text-align: center; margin-bottom: 24px; }
  .header .title { font-size: 1.8rem; font-weight: 800; color: #FFD600; letter-spacing: 2px; }
  .header .subtitle { font-size: 0.85rem; color: #888; letter-spacing: 1px; margin-top: 4px; }

  .mic-wrap { display: flex; flex-direction: column; align-items: center; margin: 32px 0; }
  .mic-btn {
    width: 100px; height: 100px; border-radius: 50%;
    background: #1a1a1a; border: 3px solid #FFD600;
    font-size: 40px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.15s;
  }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn.listening {
    background: #FFD600;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,214,0,0.5); }
    70% { box-shadow: 0 0 0 20px rgba(255,214,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,214,0,0); }
  }
  .status { margin-top: 14px; font-size: 0.85rem; color: #888; min-height: 20px; }

  .chat { width: 100%; max-width: 560px; flex: 1; }
  .bubble {
    padding: 12px 16px; border-radius: 14px; margin-bottom: 10px;
    font-size: 0.95rem; line-height: 1.4; max-width: 85%;
  }
  .bubble.user { background: #FFD600; color: #111; margin-left: auto; font-weight: 600; }
  .bubble.spark { background: #222; color: #f0f0f0; margin-right: auto; }

  .divider { width: 100%; max-width: 560px; border: none; border-top: 1px solid #333; margin: 4px 0 16px; }

  .error-box {
    background: #3a1f1f; color: #ff9a9a; padding: 12px 16px;
    border-radius: 10px; font-size: 0.85rem; max-width: 560px; width: 100%;
    display: none; margin-bottom: 16px;
  }
</style>
</head>
<body>

  <div class="header">
    <div class="title">SPARK</div>
    <div class="subtitle">PS PRO SOLUTIONS — ASYSTENT GŁOSOWY</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="mic-wrap">
    <button class="mic-btn" id="micBtn">🎤</button>
    <div class="status" id="status">Kliknij mikrofon i powiedz coś</div>
  </div>

  <hr class="divider">
  <div class="chat" id="chat"></div>

<script>
// ====== KONFIGURACJA ======
const GROQ_API_KEY = "WKLEJ_TUTAJ_SWOJ_GROQ_API_KEY"; // <-- podmień na swój klucz
const GROQ_MODEL = "llama-3.3-70b-versatile";
const SYSTEM_PROMPT = `Jesteś Spark, asystentem AI firmy PS PRO Solutions, która zajmuje się świadectwami charakterystyki energetycznej budynków. Odpowiadasz krótko, konkretnie, po polsku, ciepłym ale profesjonalnym tonem. Pomagasz klientom zamówić świadectwo energetyczne, zbierasz dane kontaktowe (imię, telefon, email) gdy klient jest zainteresowany, i odpowiadasz na pytania o proces i cenę.`;

// ====== ELEMENTY ======
const micBtn = document.getElementById('micBtn');
const statusEl = document.getElementById('status');
const chatEl = document.getElementById('chat');
const errorBox = document.getElementById('errorBox');

let history = [{ role: "system", content: SYSTEM_PROMPT }];

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

function addBubble(text, who) {
  const div = document.createElement('div');
  div.className = 'bubble ' + who;
  div.textContent = text;
  chatEl.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

// ====== ROZPOZNAWANIE MOWY (mikrofon -> tekst) ======
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  showError("Ta przeglądarka nie obsługuje rozpoznawania mowy. Użyj Chrome na komputerze lub telefonie.");
  micBtn.disabled = true;
} else {
  const recognition = new SpeechRecognition();
  recognition.lang = 'pl-PL';
  recognition.continuous = false;
  recognition.interimResults = false;

  let listening = false;

  micBtn.addEventListener('click', () => {
    if (listening) return;
    try {
      recognition.start();
    } catch (e) {
      showError("Nie udało się uruchomić mikrofonu: " + e.message);
    }
  });

  recognition.onstart = () => {
    listening = true;
    micBtn.classList.add('listening');
    statusEl.textContent = "Słucham...";
    errorBox.style.display = 'none';
  };

  recognition.onerror = (e) => {
    listening = false;
    micBtn.classList.remove('listening');
    if (e.error === 'not-allowed' || e.error === 'permission-denied') {
      showError("Brak dostępu do mikrofonu. Kliknij kłódkę/ikonę przy adresie strony i zezwól na mikrofon, potem odśwież stronę.");
    } else if (e.error === 'no-speech') {
      statusEl.textContent = "Nie usłyszałem nic — spróbuj ponownie.";
    } else {
      showError("Błąd mikrofonu: " + e.error);
    }
  };

  recognition.onend = () => {
    listening = false;
    micBtn.classList.remove('listening');
  };

  recognition.onresult = async (event) => {
    const text = event.results[0][0].transcript;
    statusEl.textContent = "Myślę...";
    addBubble(text, 'user');
    await sendToGroq(text);
  };
}

// ====== WYSYŁKA DO GROQ (tekst -> odpowiedź AI) ======
async function sendToGroq(userText) {
  history.push({ role: "user", content: userText });

  if (GROQ_API_KEY === "WKLEJ_TUTAJ_SWOJ_GROQ_API_KEY") {
    showError("Nie ustawiłeś klucza GROQ_API_KEY w kodzie strony (linijka na górze skryptu).");
    statusEl.textContent = "Kliknij mikrofon i powiedz coś";
    return;
  }

  try {
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + GROQ_API_KEY
      },
      body: JSON.stringify({
        model: GROQ_MODEL,
        messages: history
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error("Groq API error " + response.status + ": " + errText);
    }

    const data = await response.json();
    const reply = data.choices[0].message.content;
    history.push({ role: "assistant", content: reply });

    addBubble(reply, 'spark');
    speak(reply);
    statusEl.textContent = "Kliknij mikrofon i powiedz coś";
  } catch (err) {
    showError("Nie udało się połączyć z AI: " + err.message);
    statusEl.textContent = "Kliknij mikrofon i powiedz coś";
  }
}

// ====== SYNTEZA MOWY (odpowiedź -> głos) ======
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'pl-PL';
  utterance.rate = 1.0;
  window.speechSynthesis.speak(utterance);
}
</script>

</body>
</html>
